name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.presets }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        presets: ['gcc-debug', 'clang-debug', 'release', 'asan-ubsan', 'tsan']
    steps:
      - uses: actions/checkout@v6
      - name: Setup compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 clang-18 libc++-18-dev
      - name: Setup CMake & ninja
        uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
      - name: Cache settings
        uses: actions/cache@v5
        with:
          path: ${{ runner.workspace }}/build/${{ matrix.presets }}/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Config-Build-Test
        working-directory: ${{ runner.workspace }}/build/${{ matrix.presets }}
        run: |
          threads=`nproc`
          cmake --preset ${{ matrix.presets }}
          cmake --build --preset ${{ matrix.presets }} --parallel $threads
          ctest --preset ${{ matrix.presets }} --output-on-failure
      - name: Upload failed tests
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ctest-logs-${{ matrix.presets }}
          path: build/Testing/**/*.log
